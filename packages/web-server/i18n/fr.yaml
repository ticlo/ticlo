# these functions are defined in core
# but i18n need to have a top level folder for every namespace

route:
  server:
    '@name': Serveur # translated from: Server
  path:
    '@name': Chemin # translated from: Path
  method:
    '@name': Méthode # translated from: Method
  contentType:
    '@name': Type de contenu # translated from: Content Type

'static-response':
  data:
    '@name': Données # translated from: Data
  headers:
    '@name': En-têtes # translated from: Headers
  status:
    '@name': Statut # translated from: Status
