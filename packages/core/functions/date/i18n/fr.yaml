scheduler:
  '@name': Programmateur # translated from: Scheduler

'create-schedule':
  start:
    '@name': Commencer # translated from: Start
  duration:
    '@name': Durée # translated from: Duration
  repeat:
    '@name': Répéter # translated from: Repeat
    '@options':
      daily: Quotidien # translated from: Daily
      weekly: Hebdomadaire # translated from: Weekly
      dates: Dattes # translated from: Dates
      advanced: Avancé # translated from: Advanced
  months:
    '@name': Mois # translated from: Months
    '@options':
      '@placeholder': Chaque mois # translated from: Every Month
      1: Janvier # translated from: January
      2: Février # translated from: February
      3: Mars # translated from: March
      4: Avril # translated from: April
      5: Mai # translated from: May
      6: Juin # translated from: June
      7: Juillet # translated from: July
      8: Août # translated from: August
      9: Septembre # translated from: September
      10: Octobre # translated from: October
      11: Novembre # translated from: November
      12: Décembre # translated from: December
  years:
    '@name': Années # translated from: Years
    '@options':
      '@placeholder': Chaque année # translated from: Every Year
  days:
    '@name': Jours # translated from: Days
    '@options':
      '@placeholder': Tous les jours # translated from: Every Day
      '@dayUnit': ''
      0: Jour # translated from: Day
      1: Lundi # translated from: Monday
      2: Mardi # translated from: Tuesday
      3: Mercredi # translated from: Wednesday
      4: Jeudi # translated from: Thursday
      5: Vendredi # translated from: Friday
      6: Samedi # translated from: Saturday
      7: Dimanche # translated from: Sunday
      8: Jour de semaine # translated from: Weekday
      9: En dehors des jours de la semaine # translated from: Non-weekday
      'nth_ranged': -1~Dernier {{d}} ; 0~Tous les {{d}} ; 1~1er {{d}} ; 2~2ème {{d}} ; 3~3ème {{d}} # translated from: -1~Last {{d}};0~Ever-zG5/YrlL
      'nth_other': "{{count}}ème {{d}}" # translated from: {{count}}th {{d}}
  dates:
    '@name': Dattes # translated from: Dates
  wDays:
    '@name': " " # translated from: \s
  range:
    '@name': Tous les jours entre les deux # translated from: Every day in between
  name:
    '@name': Nom # translated from: Name
  priority:
    '@name': Priorité # translated from: Priority
  after:
    '@name': Pas avant # translated from: Not Before
  before:
    '@name': Pas après # translated from: Not After
  onlyWeekday:
    '@name': Uniquement en semaine # translated from: Only Weekdays
  key:
    '@name': Clé # translated from: Key
  color:
    '@name': Couleur # translated from: Color
